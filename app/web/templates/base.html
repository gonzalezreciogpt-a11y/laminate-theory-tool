<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Herramienta de laminados" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
      (function () {
        var THEME_KEY = "laminate_tool_theme_v1";

        function readCookieTheme() {
          var match = document.cookie.match(new RegExp("(?:^|; )" + THEME_KEY + "=([^;]*)"));
          return match ? decodeURIComponent(match[1]) : "";
        }

        function readStoredTheme() {
          var storedTheme = "";
          try {
            storedTheme = window.localStorage ? window.localStorage.getItem(THEME_KEY) : "";
          } catch (error) {
            storedTheme = "";
          }
          return storedTheme || readCookieTheme();
        }

        function setThemeClass(element, isDark) {
          if (!element) {
            return;
          }
          var className = (" " + (element.className || "") + " ").replace(/\s+/g, " ");
          className = className.replace(" theme-dark ", " ");
          if (isDark) {
            className += " theme-dark ";
          }
          element.className = className.replace(/^\s+|\s+$/g, "");
        }

        function applyEarlyTheme(theme) {
          var nextTheme = theme === "dark" ? "dark" : "light";
          var root = document.documentElement;
          root.setAttribute("data-theme", nextTheme);
          setThemeClass(root, nextTheme === "dark");
          root.style.colorScheme = nextTheme === "dark" ? "dark" : "light";
        }

        applyEarlyTheme(readStoredTheme());
      })();
    </script>
    <link rel="stylesheet" href="/static/styles.css?v=20260501-dark-compat">
  </head>
  <body>
    <header class="site-header">
      <div class="site-shell">
        <a href="/" class="brand-lockup">
          <img src="/static/assets/mad-formula-team-logo.png" alt="MAD Formula Team" class="brand-logo">
          <div class="brand-copy">
            <span class="brand-kicker">MAD Formula Team</span>
            <strong>Herramienta de laminados</strong>
          </div>
        </a>
        <nav class="top-nav" aria-label="Principal">
          <a href="/" class="top-nav-link{% if request.url.path == '/' %} is-active{% endif %}">Calculadora</a>
          <a href="/results" class="top-nav-link{% if request.url.path == '/results' %} is-active{% endif %}">Resultados</a>
          <a href="/compare" class="top-nav-link{% if request.url.path == '/compare' %} is-active{% endif %}">Comparador</a>
          <a href="/shuffle" class="top-nav-link{% if request.url.path in ['/shuffle', '/sweeps'] %} is-active{% endif %}">Shuffle</a>
          <a href="/materials-library" class="top-nav-link{% if request.url.path == '/materials-library' %} is-active{% endif %}">Materiales</a>
          <a href="/tutorial" class="top-nav-link{% if request.url.path == '/tutorial' %} is-active{% endif %}">Guía</a>
        </nav>
        <button type="button" class="theme-toggle" id="theme-toggle" aria-pressed="false" aria-label="Cambiar modo oscuro">
          <span class="theme-toggle-track" aria-hidden="true">
            <span class="theme-toggle-thumb"></span>
          </span>
          <span class="theme-toggle-text">Oscuro</span>
        </button>
      </div>
    </header>
    <main class="page-shell">
      {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
      <div class="site-shell site-footer-shell">
        <p>{{ public_storage_notice }}</p>
      </div>
    </footer>
    <script>
      (function () {
        var THEME_KEY = "laminate_tool_theme_v1";
        var root = document.documentElement;
        var button = document.getElementById("theme-toggle");

        function readCookieTheme() {
          var match = document.cookie.match(new RegExp("(?:^|; )" + THEME_KEY + "=([^;]*)"));
          return match ? decodeURIComponent(match[1]) : "";
        }

        function readStoredTheme() {
          var storedTheme = "";
          try {
            storedTheme = window.localStorage ? window.localStorage.getItem(THEME_KEY) : "";
          } catch (error) {
            storedTheme = "";
          }
          return storedTheme || readCookieTheme() || "light";
        }

        function writeStoredTheme(theme) {
          try {
            if (window.localStorage) {
              window.localStorage.setItem(THEME_KEY, theme);
            }
          } catch (error) {
            // Cookie fallback keeps the toggle usable when localStorage is blocked.
          }
          document.cookie = THEME_KEY + "=" + encodeURIComponent(theme) + "; path=/; max-age=31536000; SameSite=Lax";
        }

        function setThemeClass(element, isDark) {
          if (!element) {
            return;
          }
          var className = (" " + (element.className || "") + " ").replace(/\s+/g, " ");
          className = className.replace(" theme-dark ", " ");
          if (isDark) {
            className += " theme-dark ";
          }
          element.className = className.replace(/^\s+|\s+$/g, "");
        }

        function setButtonState(isDark) {
          if (!button) {
            return;
          }
          var labels = button.getElementsByClassName("theme-toggle-text");
          button.setAttribute("aria-pressed", isDark ? "true" : "false");
          if (labels.length) {
            labels[0].innerHTML = isDark ? "Claro" : "Oscuro";
          }
        }

        function applyTheme(theme) {
          var nextTheme = theme === "dark" ? "dark" : "light";
          var isDark = nextTheme === "dark";
          root.setAttribute("data-theme", nextTheme);
          setThemeClass(root, isDark);
          setThemeClass(document.body, isDark);
          root.style.colorScheme = isDark ? "dark" : "light";
          setButtonState(isDark);
        }

        function toggleTheme() {
          var nextTheme = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
          writeStoredTheme(nextTheme);
          applyTheme(nextTheme);
        }

        applyTheme(readStoredTheme());
        if (button) {
          if (button.addEventListener) {
            button.addEventListener("click", toggleTheme, false);
          } else if (button.attachEvent) {
            button.attachEvent("onclick", toggleTheme);
          }
        }
      })();
    </script>
  </body>
</html>
